- name: Turn off all swap devices and files
  command: swapoff -a
  when: ansible_os_family == "RedHat"
  tags:
    - install
    - configure
- name: Remove swap entries from /etc/fstab
  lineinfile:
    path: /etc/fstab
    regexp: '^.*\s+swap\s+.*$'
    state: absent
  tags:
    - install
    - configure
- name: Verify swap is disabled
  shell: free | grep -i '^Swap:'
  register: swap_status
  failed_when: swap_status.stdout.split() | length >= 4 and swap_status.stdout.split()[1] | int > 0
  tags:
    - install
    - configure
- name: Ensure swap is disabled after reboot
  block:
    - name: Persistently disable swap in systemd
      command: systemctl mask swap.target
      when: ansible_distribution_major_version | int >= 8
      register: mask_swap_result
  tags:
    - install
    - configures