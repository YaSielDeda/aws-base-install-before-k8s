- name: Setting the account expiration date
  become: yes
  user:
    name: ansible
    password_expire_min: 0
    password_expire_max: 99999
    expires: -1
  tags:
    - install
    - configure
- name: Get status services
  service_facts:
  tags:
    - install
    - configure
