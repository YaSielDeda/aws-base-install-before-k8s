- name: Uncomment ssh alive interval
  become: yes
  lineinfile:
    dest: /etc/ssh/sshd_config
    regexp: '#ClientAliveInterval 0'
    line: 'ClientAliveInterval 300'
  tags:
    - install
    - configure
- name: Uncomment ssh alive count max
  become: yes
  lineinfile:
    dest: /etc/ssh/sshd_config
    regexp: '#ClientAliveCountMax 3'
    line: 'ClientAliveCountMax 3'
  tags:
    - install
    - configure
- name: GSSAPIAuthentication disable
  become: yes
  lineinfile:
    dest: /etc/ssh/sshd_config
    regexp: 'GSSAPIAuthentication yes'
    line: 'GSSAPIAuthentication no'
  tags:
    - install
    - configure
- name: Restart ssh service
  become: yes
  service:
    name: ssh
    state: restarted
  tags:
    - install
    - configure
